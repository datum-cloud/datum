apiVersion: search.miloapis.com/v1alpha1
kind: ResourceIndexPolicy
metadata:
  name: httpproxy-resource-index-policy
spec:
  conditions:
  - expression: has(metadata.name)
    name: has-name
  fields:
  - path: .metadata.name
    searchable: true
  - path: .metadata.namespace
    searchable: true
  - path: .metadata.annotations["kubernetes.io/display-name"]
    searchable: true
  - path: .metadata.annotations["kubernetes.io/description"]
    searchable: true
  # NOTE: [*] array-traversal syntax is not currently supported by the
  # ResourceIndexPolicy validator in milo-os/search. The following paths are
  # commented out until that lands. Tracked in milo-os/search#97.
  # - path: .spec.rules[*].hostnames[*]
  #   searchable: true
  # - path: .spec.rules[*].name
  #   searchable: true
  # - path: .spec.rules[*].backends[*].endpoint
  #   searchable: true
  # - path: .status.addresses[*].value
  #   searchable: true
  targetResource:
    group: networking.datumapis.com
    kind: HTTPProxy
    version: v1alpha
