  textBody: |
    ----------------------------------------
    
    Hi {{.UserName}},
    
    Good news, you're off the waitlist! I'm excited to share what we've built (so far) with Datum Cloud and get your feedback. To get started, just login below:
    
    Start building {{.ActionUrl}}
    
